deepseek:
  api_key: ""
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"


run:
  use_llm: true
  targets: []  # Example: ["Proxima Centauri", "AD Leo"]
  targets_file: "targets_input.txt"

http:
  timeout_sec: 45

output:
  dir: "results"
  format: "both"  # json | md | both

agent:
  gaia_cone_radius_arcsec: 5.0
  mast_radius_deg: 0.02
  simbad_reference_time_range: "all"  # all | recent10
  literature_min_obj_freq: 3
